[build]
target = "riscv32imac-unknown-none-elf"

[target.riscv32imac-unknown-none-elf]
# Flash over the native USB-Serial-JTAG and stream defmt logs. espflash decodes the
# defmt framing from the same ELF it just flashed.
runner = "espflash flash --monitor --chip esp32h2 --log-format defmt"
# linkall.x (esp-hal) defines the memory regions, trap/vector symbols and stack;
# defmt.x places the defmt interned strings. Frame pointers let esp-backtrace
# produce usable stack traces on RISC-V.
rustflags = [
    "-C",
    "link-arg=-Tlinkall.x",
    "-C",
    "link-arg=-Tdefmt.x",
    "-C",
    "force-frame-pointers",
]

[env]
# Compile-time defmt level filter (env_logger syntax; most-specific path wins).
# Keep trace on our own crates, but cap esp_radio — its NimBLE port layer
# (ble/npl.rs, compat/*) trace-logs every critical-section enter/exit and HCI
# event, which floods RTT. warn silences that without losing our logs or the
# trouble-host/esp-hal trace useful for BLE debugging.
DEFMT_LOG = "trace,esp_radio=warn"
