[env]
CARGO_MAKE_EXTEND_WORKSPACE_MAKEFILE = true
TARGET = "thumbv7em-none-eabihf"
CHIP = "STM32H753ZITx"

[tasks.format]
install_crate = "rustfmt"
command = "cargo"
args = ["fmt", "--", "--emit=files"]

[tasks.clippy]
command = "cargo"
args = ["clippy", "--", "-D", "warnings"]

[tasks.build]
description = "Build firmware"
command = "cargo"
args = ["build", "--release", "-p", "meteo-firmware"]

[tasks.flash]
description = "Flash firmware"
command = "probe-rs"
args = ["run", "--chip", "${CHIP}", "${CARGO_MAKE_WORKSPACE_WORKING_DIRECTORY}/target/${TARGET}/release/meteo-firmware"]
dependencies = ["build"]

[tasks.run]
description = "Flash and attach with RTT logging"
command = "probe-rs"
args = ["run", "--chip", "${CHIP}", "${CARGO_MAKE_WORKSPACE_WORKING_DIRECTORY}/target/${TARGET}/release/meteo-firmware"]
dependencies = ["build"]

[tasks.clean]
description = "Clean build artifacts"
command = "cargo"
args = ["clean"]

[tasks.reset]
description = "Reset device under connect-under-reset"
command = "probe-rs"
args = ["reset", "--chip", "${CHIP}", "--connect-under-reset"]

[tasks.debug]
description = "Flash and attach with RTT logging (30s timeout for diagnostics)"
command = "probe-rs"
args = ["run", "--chip", "${CHIP}", "${CARGO_MAKE_WORKSPACE_WORKING_DIRECTORY}/target/${TARGET}/release/meteo-firmware"]
dependencies = ["build"]

[tasks.test]
description = "Run tests on host"
command = "cargo"
args = ["nextest", "run", "--lib", "--target", "x86_64-unknown-linux-gnu"]

[tasks.size]
description = "Show binary size information"
dependencies = ["build"]
script = '''
arm-none-eabi-size ${CARGO_MAKE_WORKSPACE_WORKING_DIRECTORY}/target/${TARGET}/release/meteo-firmware
'''
